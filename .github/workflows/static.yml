name: Deploy PDFs with Full Debug

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Ensure LFS installed
        run: |
          git lfs install

      - name: Pull LFS objects
        run: |
          git lfs pull
          git lfs checkout

      - name: Show repository tree
        run: |
          echo "===== TREE ====="
          ls -R

      - name: Show PDF sizes
        run: |
          echo "===== PDF FILES ====="
          find . -name "*.pdf" -exec ls -lh {} \;

      - name: Generate index.html
        run: |
          echo "<!DOCTYPE html>" > index.html
          echo "<html><body>" >> index.html
          echo "<h1>PDF Repository Test</h1>" >> index.html
          echo "<ul>" >> index.html
          find . -name "*.pdf" | sed 's|^\./||' | while read file; do
            echo "<li><a href=\"$file\">$file</a></li>" >> index.html
          done
          echo "</ul></body></html>" >> index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        uses: actions/deploy-pages@v4
