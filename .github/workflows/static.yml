name: Deploy PDFs with Debug

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
         lfs: true

      - name: Show current directory
        run: pwd

      - name: List full repo structure
        run: |
          echo "===== FILE TREE ====="
          ls -R

      - name: Generate test index.html
        run: |
          echo "<!DOCTYPE html>" > index.html
          echo "<html><body>" >> index.html
          echo "<h1>PDF Repository Test</h1>" >> index.html
          echo "<p>If you see this, Pages works.</p>" >> index.html
          echo "<h2>PDF files found:</h2><ul>" >> index.html

          find . -name "*.pdf" | sed 's|^\./||' | while read file; do
            echo "<li><a href=\"$file\">$file</a></li>" >> index.html
          done

          echo "</ul></body></html>" >> index.html

      - name: Show generated index
        run: |
          echo "===== INDEX.HTML ====="
          cat index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
