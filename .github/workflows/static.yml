name: Deploy PDFs with Full Debug

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Pull LFS objects
        run: git lfs pull

      - name: Show working directory
        run: pwd

      - name: Print full repository tree
        run: |
          echo "===== REPOSITORY TREE ====="
          ls -R

      - name: Inspect PDF files
        run: |
          echo "===== PDF FILES ====="
          find . -name "*.pdf" -exec ls -lh {} \;

      - name: Generate test index.html
        run: |
          echo "<!DOCTYPE html>" > index.html
          echo "<html><body>" >> index.html
          echo "<h1>PDF Repository Test</h1>" >> index.html
          echo "<p>If you see this, Pages works.</p>" >> index.html
          echo "<h2>PDF files found:</h2><ul>" >> index.html

          find . -name "*.pdf" | sed 's|^\./||' | while read file; do
            echo "<li><a href=\"$file\">$file</a></li>" >> index.html
          done

          echo "</ul></body></html>" >> index.html

      - name: Show generated index
        run: |
          echo "===== INDEX.HTML ====="
          cat index.html

      - name: Show files to deploy
        run: |
          echo "===== FILES THAT WILL BE DEPLOYED ====="
          find . -type f

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
